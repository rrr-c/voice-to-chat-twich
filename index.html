<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Chat for Twitch</title>
    <style>
        :root { --twitch-purple: #9146ff; --twitch-bg: #18181b; --twitch-panel: #1f1f23; --twitch-input: #0e0e10; --twitch-text: #efeff1; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--twitch-bg); color: var(--twitch-text); padding: 20px; line-height: 1.5; }
        .container { max-width: 700px; margin: 0 auto; background: var(--twitch-panel); padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        h1 { color: #bf94ff; text-align: center; margin-top: 0; }
        
        .section { margin-bottom: 20px; padding: 15px; background: #26262c; border-radius: 8px; border: 1px solid #3a3a3d; display: none; }
        label { font-size: 0.85em; color: #adadb8; display: block; margin-bottom: 4px; }
        
        input[type="text"], textarea { background: var(--twitch-input); border: 1px solid #464649; color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; width: 100%; }
        input:focus, textarea:focus { outline: none; border-color: #bf94ff; }
        
        button { background-color: var(--twitch-purple); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; width: 100%; }
        button:hover { background-color: #772ce8; }
        button.secondary { background-color: #3a3a3d; margin-top: 10px; }
        .btn-danger { background-color: #e0245e; width: auto; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        #preview-box { min-height: 40px; background: #0e0e10; padding: 10px; border-radius: 4px; color: #adadb8; font-size: 0.9em; margin-bottom: 10px; border-left: 4px solid #555; }
        #buffer-box { min-height: 80px; border: 2px solid var(--twitch-purple); font-size: 1.1em; margin-bottom: 10px; white-space: pre-wrap; word-break: break-all; }
        
        .dict-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .dict-table th, .dict-table td { padding: 8px; text-align: left; border-bottom: 1px solid #3a3a3d; }
        .dict-form { display: flex; gap: 5px; margin-top: 10px; }
        .log-list { list-style: none; padding: 10px; max-height: 150px; overflow-y: auto; background: #000; border-radius: 4px; font-family: monospace; font-size: 0.8em; }

        .mode-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; font-size: 0.9em; color: #adadb8; }
        .mode-selector label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px #e0245e; }
            50% { box-shadow: 0 0 20px #e0245e; }
            100% { box-shadow: 0 0 5px #e0245e; }
        }
        .recording-active { background-color: #e0245e !important; animation: pulse-glow 1.5s infinite; }
    </style>
</head>
<body>

<div class="container">
    <h1>Voice to Chat for Twitch</h1>

    <div id="setup-section" class="section">
        <h2 style="font-size: 1.2em;">⚙️ 初期設定</h2>
        <input type="text" id="client-id-input" placeholder="Twitch Client ID を入力">
        <p style="font-size: 0.8em; color: #adadb8; margin-top: 10px;">
            Redirect URI: <strong id="display-redirect-uri" style="color: #bf94ff;"></strong>
        </p>
        <button id="save-setup-btn">保存して進む</button>
    </div>

    <div id="auth-section" class="section">
        <p style="text-align: center;">Twitch連携が必要です。</p>
        <button id="login-btn">Twitchでログイン</button>
        <button id="reset-client-btn" class="secondary">Client ID を再設定</button>
    </div>

    <div id="app-section" class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>User: <strong id="user-info" style="color:#bf94ff;">---</strong></span>
            <button id="logout-btn" class="secondary" style="width: auto; padding: 5px 10px; margin: 0; font-size: 0.8em;">Logout</button>
        </div>

        <details>
            <summary style="cursor:pointer; font-weight:bold; color:#bf94ff; margin-bottom: 10px;">⚙️ 詳細設定</summary>
            
            <div style="margin: 10px 0; padding-top: 10px; border-top: 1px solid #3a3a3d;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="auto-restart-chk" style="width: auto;"> 
                    認識が切れたら自動で再開する (トグルモードのみ)
                </label>
            </div>

            <div class="settings-grid">
                <div><label>送信コマンド</label><input type="text" id="cmd-send"></div>
                <div><label>キャンセルコマンド</label><input type="text" id="cmd-cancel"></div>
                <div style="grid-column: span 2;"><label>送信先 (空欄で自分)</label><input type="text" id="target-channel"></div>
            </div>

            <div style="margin-top: 15px;">
                <label>📖 エモート辞書</label>
                <div class="dict-form">
                    <input type="text" id="dict-word" placeholder="認識語">
                    <input type="text" id="dict-code" placeholder="変換コード">
                    <button id="add-dict-btn" style="width:auto;">追加</button>
                </div>
                <table class="dict-table"><tbody id="dict-body"></tbody></table>
            </div>
        </details>

        <div style="margin-top: 15px;">
            <label>認識中...</label>
            <div id="preview-box">マイクをONにしてください</div>
            <label>送信バッファ</label>
            <textarea id="buffer-box" placeholder="ここに音声が溜まります..."></textarea>
        </div>

        <div class="mode-selector">
            <label><input type="radio" name="mic-mode" value="toggle" checked> トグル</label>
            <label><input type="radio" name="mic-mode" value="ptt"> PTT (長押し)</label>
        </div>

        <button id="mic-btn" style="font-size: 1.1em; height: 55px;">マイクをオンにする</button>
        <p style="text-align: center; font-size: 0.8em; color: #adadb8;">Status: <span id="status-text">停止中</span></p>

        <label>ログ</label>
        <ul id="log-list" class="log-list"></ul>
    </div>
</div>

<script>
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    document.getElementById('display-redirect-uri').innerText = REDIRECT_URI;

    let clientId = localStorage.getItem('twitch_client_id');
    let accessToken = '';
    let myUserId = '';
    let recognition;
    let isRecording = false;
    let currentMode = 'toggle';

    const micBtn = document.getElementById('mic-btn');
    const bufferBox = document.getElementById('buffer-box');
    const previewBox = document.getElementById('preview-box');
    const statusText = document.getElementById('status-text');

    // --- 設定ロード ---
    const cmdSendInput = document.getElementById('cmd-send');
    const cmdCancelInput = document.getElementById('cmd-cancel');
    const targetChannelInput = document.getElementById('target-channel');
    const autoRestartChk = document.getElementById('auto-restart-chk');

    cmdSendInput.value = localStorage.getItem('twitch_cmd_send') || "チャット送信";
    cmdCancelInput.value = localStorage.getItem('twitch_cmd_cancel') || "キャンセル";
    targetChannelInput.value = localStorage.getItem('twitch_target_channel') || "";
    autoRestartChk.checked = localStorage.getItem('twitch_auto_restart') === 'true';

    let emoteDictionary = JSON.parse(localStorage.getItem('twitch_voice_dict')) || [{word: "カッパ", code: "Kappa"}];

    // --- 初期化 ---
    window.onload = async () => {
        const params = getHashParams();
        if (params.access_token && clientId) {
            accessToken = params.access_token;
            window.location.hash = ""; 
            showSection('app-section');
            await fetchUserInfo();
            renderDictionary();
            setupSpeechRecognition();
        } else if (!clientId) {
            showSection('setup-section');
        } else {
            showSection('auth-section');
        }
    };

    function showSection(id) {
        ['setup-section', 'auth-section', 'app-section'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // --- 音声認識コア (初期ソースの安定ロジックをベースに修正) ---
    function setupSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("非対応ブラウザです");
        
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
            isRecording = true;
            statusText.innerText = '聴取中...';
            micBtn.classList.add('recording-active');
            micBtn.innerText = currentMode === 'toggle' ? 'マイクをオフにする' : '録音中...';
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) finalTranscript += transcript;
                else interimTranscript += transcript;
            }

            // リアルタイム表示 (プレビュー)
            previewBox.innerText = interimTranscript || "...";

            if (finalTranscript) {
                const sCmd = cmdSendInput.value.trim();
                const cCmd = cmdCancelInput.value.trim();

                if (cCmd && finalTranscript.includes(cCmd)) {
                    bufferBox.value = "";
                    addLog("キャンセルしました");
                } else if (sCmd && finalTranscript.includes(sCmd)) {
                    const clean = finalTranscript.replace(new RegExp(sCmd, 'g'), "").trim();
                    bufferBox.value += applyDict(clean);
                    sendTwitchMessage();
                } else {
                    bufferBox.value += applyDict(finalTranscript);
                }
            }
        };

        recognition.onend = () => {
            if (currentMode === 'toggle' && isRecording && autoRestartChk.checked) {
                try { recognition.start(); return; } catch(e) {}
            }
            isRecording = false;
            statusText.innerText = '停止中';
            micBtn.classList.remove('recording-active');
            micBtn.innerText = currentMode === 'toggle' ? 'マイクをオンにする' : '押している間だけ話す';
        };
    }

    // --- ボタン操作イベント (単一の管理に統合) ---
    const handleMicAction = (start) => {
        if (start) {
            if (!isRecording) try { recognition.start(); } catch(e){}
        } else {
            if (isRecording) { isRecording = false; recognition.stop(); }
        }
    };

    micBtn.addEventListener('mousedown', (e) => { if(currentMode==='ptt') { e.preventDefault(); handleMicAction(true); } });
    micBtn.addEventListener('mouseup', () => { if(currentMode==='ptt') handleMicAction(false); });
    micBtn.addEventListener('touchstart', (e) => { if(currentMode==='ptt') { e.preventDefault(); handleMicAction(true); } });
    micBtn.addEventListener('touchend', () => { if(currentMode==='ptt') handleMicAction(false); });
    
    micBtn.addEventListener('click', () => {
        if (currentMode === 'toggle') {
            if (isRecording) handleMicAction(false);
            else handleMicAction(true);
        }
    });

    // --- その他補助機能 ---
    document.querySelectorAll('input[name="mic-mode"]').forEach(r => {
        r.addEventListener('change', (e) => {
            currentMode = e.target.value;
            handleMicAction(false);
            micBtn.innerText = currentMode === 'toggle' ? 'マイクをオンにする' : '押している間だけ話す';
        });
    });

    document.getElementById('save-setup-btn').addEventListener('click', () => {
        const val = document.getElementById('client-id-input').value.trim();
        if (val) { clientId = val; localStorage.setItem('twitch_client_id', val); showSection('auth-section'); }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:write:chat`;
    });

    document.getElementById('logout-btn').addEventListener('click', () => { location.href = REDIRECT_URI; });
    
    autoRestartChk.addEventListener('change', () => localStorage.setItem('twitch_auto_restart', autoRestartChk.checked));

    function applyDict(text) {
        let t = text;
        emoteDictionary.forEach(item => { t = t.replace(new RegExp(item.word, 'g'), ` ${item.code} `); });
        return t;
    }

    function renderDictionary() {
        const tbody = document.getElementById('dict-body');
        tbody.innerHTML = '';
        emoteDictionary.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.word}</td><td><code>${item.code}</code></td><td><button class="btn-danger" onclick="deleteDictItem(${index})">×</button></td>`;
            tbody.appendChild(tr);
        });
        localStorage.setItem('twitch_voice_dict', JSON.stringify(emoteDictionary));
    }

    document.getElementById('add-dict-btn').addEventListener('click', () => {
        const w = document.getElementById('dict-word').value.trim();
        const c = document.getElementById('dict-code').value.trim();
        if(w && c) { emoteDictionary.push({word: w, code: c}); renderDictionary(); }
    });
    window.deleteDictItem = (i) => { emoteDictionary.splice(i, 1); renderDictionary(); };

    async function fetchUserInfo() {
        const resp = await fetch('https://api.twitch.tv/helix/users', { headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': clientId } });
        const data = await resp.json();
        myUserId = data.data[0].id;
        document.getElementById('user-info').innerText = data.data[0].display_name;
    }

    async function sendTwitchMessage() {
        const msg = bufferBox.value.trim();
        if (!msg) return;
        const targetName = targetChannelInput.value.trim();
        let targetId = myUserId;

        if (targetName) {
            const resp = await fetch(`https://api.twitch.tv/helix/users?login=${targetName}`, { headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': clientId } });
            const d = await resp.json();
            if (d.data && d.data[0]) targetId = d.data[0].id;
        }

        const response = await fetch('https://api.twitch.tv/helix/chat/messages', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': clientId, 'Content-Type': 'application/json' },
            body: JSON.stringify({ broadcaster_id: targetId, sender_id: myUserId, message: msg })
        });
        if (response.ok) { addLog(`送信成功: ${msg}`); bufferBox.value = ""; }
    }

    function addLog(text) {
        const li = document.createElement('li');
        li.innerText = `${new Date().toLocaleTimeString()} - ${text}`;
        document.getElementById('log-list').prepend(li);
    }

    function getHashParams() {
        const hash = window.location.hash.substring(1);
        const params = {};
        hash.split('&').forEach(hk => { const temp = hk.split('='); params[temp[0]] = temp[1]; });
        return params;
    }
</script>
</body>
</html>
