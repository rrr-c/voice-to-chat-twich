<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Chat for Twitch</title>
    <style>
        :root { --twitch-purple: #9146ff; --twitch-bg: #18181b; --twitch-panel: #1f1f23; --twitch-input: #0e0e10; --twitch-text: #efeff1; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--twitch-bg); color: var(--twitch-text); padding: 20px; line-height: 1.5; }
        .container { max-width: 700px; margin: 0 auto; background: var(--twitch-panel); padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        h1 { color: #bf94ff; text-align: center; margin-top: 0; }
        
        .section { margin-bottom: 20px; padding: 15px; background: #26262c; border-radius: 8px; border: 1px solid #3a3a3d; display: none; }
        label { font-size: 0.85em; color: #adadb8; display: block; margin-bottom: 4px; }
        
        input[type="text"], textarea { background: var(--twitch-input); border: 1px solid #464649; color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; width: 100%; }
        input:focus, textarea:focus { outline: none; border-color: #bf94ff; }
        
        button { background-color: var(--twitch-purple); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; width: 100%; }
        button:hover { background-color: #772ce8; }
        button.secondary { background-color: #3a3a3d; margin-top: 10px; }
        .btn-danger { background-color: #e0245e; width: auto; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        #preview-box { min-height: 40px; background: #0e0e10; padding: 10px; border-radius: 4px; color: #adadb8; font-size: 0.9em; margin-bottom: 10px; border-left: 4px solid #555; }
        #buffer-box { min-height: 80px; border: 2px solid var(--twitch-purple); font-size: 1.1em; margin-bottom: 10px; white-space: pre-wrap; word-break: break-all; }
        
        .dict-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .dict-table th, .dict-table td { padding: 8px; text-align: left; border-bottom: 1px solid #3a3a3d; }
        .dict-form { display: flex; gap: 5px; margin-top: 10px; }
        .log-list { list-style: none; padding: 10px; max-height: 150px; overflow-y: auto; background: #000; border-radius: 4px; font-family: monospace; font-size: 0.8em; }

        /* モード切り替えスイッチのレイアウト */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #adadb8;
        }
        .mode-selector label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        /* マイクボタン（スマホ長押し対策） */
        #mic-btn {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        /* 録音中の光るアニメーション */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px #e0245e, 0 0 10px #e0245e; }
            50% { box-shadow: 0 0 20px #e0245e, 0 0 35px #e0245e; }
            100% { box-shadow: 0 0 5px #e0245e, 0 0 10px #e0245e; }
        }
        .recording-active {
            background-color: #e0245e !important;
            border: 2px solid #ff7396;
            animation: pulse-glow 1.5s infinite;
            /* アニメーション中にボタンサイズが変わらないよう調整 */
            box-sizing: border-box; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Voice to Chat for Twitch</h1>

    <div id="setup-section" class="section">
        <h2 style="font-size: 1.2em;">⚙️ 初期設定</h2>
        <p style="font-size: 0.85em; color: #adadb8;">Twitch Developer Consoleで取得した Client ID を入力してください。</p>
        <input type="text" id="client-id-input" placeholder="Client ID を入力">
        <p style="font-size: 0.8em; color: #adadb8; margin-top: 15px;">
            ※リダイレクトURLとして以下をTwitch側に登録してください：<br>
            <strong id="display-redirect-uri" style="color: #bf94ff; word-break: break-all;"></strong>
        </p>
        <button id="save-setup-btn">設定を保存して進む</button>
    </div>

    <div id="auth-section" class="section">
        <p style="text-align: center;">チャット送信を開始するにはTwitch連携が必要です。</p>
        <button id="login-btn">Twitchでログイン</button>
        <button id="reset-client-btn" class="secondary">Client ID を再設定する</button>
    </div>

<div id="app-section" class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>Login: <strong id="user-info" style="color:#bf94ff;">---</strong></span>
            <button id="logout-btn" class="secondary" style="width: auto; padding: 5px 10px; margin: 0; font-size: 0.8em;">Logout</button>
        </div>

        <div style="margin-top: 10px;">
            <details>
                <summary style="cursor:pointer; font-weight:bold; color:#bf94ff; margin-bottom: 10px;">⚙️ 詳細設定 (コマンド・送信先・辞書)</summary>
                
                <div class="settings-grid">
                    <div>
                        <label>送信コマンド</label>
                        <input type="text" id="cmd-send">
                    </div>
                    <div>
                        <label>キャンセルコマンド</label>
                        <input type="text" id="cmd-cancel">
                    </div>
                    <div style="grid-column: span 2;">
                        <label>送信先チャンネル (空欄で自分)</label>
                        <input type="text" id="target-channel" placeholder="例: twitchdev">
                    </div>
                </div>

                <div style="margin-top: 20px; border-top: 1px solid #3a3a3d; padding-top: 10px;">
                    <label>📖 エモート辞書設定</label>
                    <div class="dict-form">
                        <input type="text" id="dict-word" placeholder="認識ワード">
                        <input type="text" id="dict-code" placeholder="コード">
                        <button id="add-dict-btn" style="width:auto;">追加</button>
                    </div>
                    <table class="dict-table">
                        <thead><tr><th>ワード</th><th>変換</th><th></th></tr></thead>
                        <tbody id="dict-body"></tbody>
                    </table>
                </div>
            </details>
        </div>
        <div style="margin-top: 15px;">
            <label>認識中...</label>
            <div id="preview-box"></div>
            <label>送信バッファ</label>
            <textarea id="buffer-box" placeholder="音声がここに溜まります..."></textarea>
        </div>

        <div class="mode-selector">
            <label><input type="radio" name="mic-mode" value="toggle" checked> トグル (タップでON/OFF)</label>
            <label><input type="radio" name="mic-mode" value="ptt"> PTT (長押しで話す)</label>
        </div>

        <button id="mic-btn" style="font-size: 1.1em; height: 50px; transition: all 0.3s ease;">マイクをオンにする</button>
        <p style="text-align: center; font-size: 0.8em; color: #adadb8;">Status: <span id="status-text">停止中</span></p>

        <label>ログ</label>
        <ul id="log-list" class="log-list"></ul>
    </div>
</div>

<script>
    // --- 環境設定 ---
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    document.getElementById('display-redirect-uri').innerText = REDIRECT_URI;

    let clientId = localStorage.getItem('twitch_client_id');
    let accessToken = '';
    let myUserId = '';
    let recognition;
    let isRecording = false;
    let currentMode = 'toggle'; // 'toggle' または 'ptt'

    // --- モード切り替えの監視 ---
    const modeRadios = document.querySelectorAll('input[name="mic-mode"]');
    const micBtn = document.getElementById('mic-btn');

    modeRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            currentMode = e.target.value;
            // モード変更時は安全のため録音を強制停止
            if (isRecording) {
                recognition.stop();
            }
            // ボタンの初期テキスト変更
            micBtn.innerText = currentMode === 'toggle' ? 'マイクをオンにする' : '押している間だけ話す';
        });
    });

    // --- 設定値の読み込み ---
    const cmdSendInput = document.getElementById('cmd-send');
    const cmdCancelInput = document.getElementById('cmd-cancel');
    const targetChannelInput = document.getElementById('target-channel');

    cmdSendInput.value = localStorage.getItem('twitch_cmd_send') || "チャット送信";
    cmdCancelInput.value = localStorage.getItem('twitch_cmd_cancel') || "キャンセル";
    targetChannelInput.value = localStorage.getItem('twitch_target_channel') || "";

    let emoteDictionary = JSON.parse(localStorage.getItem('twitch_voice_dict')) || [
        { word: "カッパ", code: "Kappa" },
        { word: "ニコニコ", code: "LUL" }
    ];

    // --- ルーティング制御 ---
    window.onload = async () => {
        const params = getHashParams();

        if (params.access_token && clientId) {
            accessToken = params.access_token;
            window.location.hash = ""; 
            showSection('app-section');
            await fetchUserInfo();
            renderDictionary();
            setupSpeechRecognition();
        } else if (!clientId) {
            showSection('setup-section');
        } else {
            showSection('auth-section');
        }
    };

    function showSection(id) {
        // 1. 直下の親要素 container 内にある、メインの3つのセクションだけを非表示にする
        const sections = ['setup-section', 'auth-section', 'app-section'];
        sections.forEach(s => {
            document.getElementById(s).style.display = 'none';
        });
        
        // 2. 指定された画面だけを表示する
        document.getElementById(id).style.display = 'block';
    }

    // --- イベントリスナー ---
    document.getElementById('save-setup-btn').addEventListener('click', () => {
        const val = document.getElementById('client-id-input').value.trim();
        if (val) {
            clientId = val;
            localStorage.setItem('twitch_client_id', val);
            showSection('auth-section');
        }
    });

    document.getElementById('reset-client-btn').addEventListener('click', () => {
        if(confirm("Client ID をリセットしますか？")) {
            localStorage.removeItem('twitch_client_id');
            location.reload();
        }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        const url = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:write:chat`;
        window.location.href = url;
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        location.href = REDIRECT_URI; 
    });

    // 設定の自動保存
    [cmdSendInput, cmdCancelInput, targetChannelInput].forEach(el => {
        el.addEventListener('input', () => {
            localStorage.setItem('twitch_cmd_send', cmdSendInput.value);
            localStorage.setItem('twitch_cmd_cancel', cmdCancelInput.value);
            localStorage.setItem('twitch_target_channel', targetChannelInput.value);
        });
    });

    // --- マイクボタンのイベント処理 ---
    // 1. トグルモード用の処理 (Click)
    micBtn.addEventListener('click', (e) => {
        if (currentMode !== 'toggle') return;
        if (isRecording) { 
            recognition.stop(); 
        } else { 
            try { recognition.start(); } catch(err){} 
        }
    });
    // 2. PTTモード用の処理 (Mousedown / Touchstart)
    const startPtt = (e) => {
        if (currentMode !== 'ptt') return;
        e.preventDefault(); // スマホでのテキスト選択やメニュー表示を防止
        if (!isRecording) {
            try { recognition.start(); } catch(err){}
        }
    };
    // 3. PTTモード用の処理 (Mouseup / Touchend / Mouseleave)
    const stopPtt = (e) => {
        if (currentMode !== 'ptt') return;
        e.preventDefault();
        if (isRecording) {
            recognition.stop();
        }
    };
    // PTTイベントの登録
    micBtn.addEventListener('mousedown', startPtt);
    micBtn.addEventListener('touchstart', startPtt);
    micBtn.addEventListener('mouseup', stopPtt);
    micBtn.addEventListener('touchend', stopPtt);
    micBtn.addEventListener('mouseleave', stopPtt); // ボタンから指やカーソルが外れたら止める

    // --- 辞書ロジック ---
    function renderDictionary() {
        const tbody = document.getElementById('dict-body');
        tbody.innerHTML = '';
        emoteDictionary.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.word}</td><td><code>${item.code}</code></td>
                <td><button class="btn-danger" onclick="deleteDictItem(${index})">×</button></td>`;
            tbody.appendChild(tr);
        });
        localStorage.setItem('twitch_voice_dict', JSON.stringify(emoteDictionary));
    }

    document.getElementById('add-dict-btn').addEventListener('click', () => {
        const w = document.getElementById('dict-word').value.trim();
        const c = document.getElementById('dict-code').value.trim();
        if(w && c) {
            emoteDictionary.push({word: w, code: c});
            renderDictionary();
            document.getElementById('dict-word').value = '';
            document.getElementById('dict-code').value = '';
        }
    });

    window.deleteDictItem = (i) => { emoteDictionary.splice(i, 1); renderDictionary(); };

    function applyDict(text) {
        let t = text;
        emoteDictionary.forEach(item => {
            t = t.replace(new RegExp(item.word, 'g'), ` ${item.code} `);
        });
        return t;
    }

    // --- 音声認識コア ---
    function setupSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("このブラウザは音声認識非対応です");
        
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true; // PTTでも長文を途切れさせないためにtrueにしておく

        recognition.onstart = () => {
            isRecording = true;
            document.getElementById('status-text').innerText = '聴取中...';
            // JSでの直接色指定をやめ、CSSクラスを付与する
            micBtn.classList.add('recording-active');
            micBtn.innerText = currentMode === 'toggle' ? 'マイクをオフにする' : '録音中...';
        };

        recognition.onresult = (event) => {
            // (中略) 既存の onresult の中身はそのまま維持してください
            let interim = '';
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            document.getElementById('preview-box').innerText = interim;

            if (final) {
                const sCmd = cmdSendInput.value.trim();
                const cCmd = cmdCancelInput.value.trim();
                const buffer = document.getElementById('buffer-box');

                if (cCmd && final.includes(cCmd)) {
                    buffer.value = "";
                    addLog("キャンセルしました");
                } else if (sCmd && final.includes(sCmd)) {
                    const clean = final.replace(new RegExp(sCmd, 'g'), "").trim();
                    buffer.value += applyDict(clean);
                    sendTwitchMessage();
                } else {
                    buffer.value += applyDict(final);
                }
            }
        };

        recognition.onend = () => {
            isRecording = false;
            document.getElementById('status-text').innerText = '停止中';
            // CSSクラスを外す
            micBtn.classList.remove('recording-active');
            micBtn.innerText = currentMode === 'toggle' ? 'マイクをオンにする' : '押している間だけ話す';
            
            // ★重要: 勝手に再起動するロジック（if(isRecording) recognition.start()）は削除しました。
            // これにより、トグルモードでも無音が続いて自動停止した場合は、ユーザーが手動で再開する必要があります。
            // （意図しない通知音スパムを防ぐためです）
        };
    }

    document.getElementById('mic-btn').addEventListener('click', () => {
        if (isRecording) { isRecording = false; recognition.stop(); }
        else { recognition.start(); }
    });

    // --- Twitch API ---
    async function fetchUserInfo() {
        const resp = await fetch('https://api.twitch.tv/helix/users', {
            headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': clientId }
        });
        const data = await resp.json();
        myUserId = data.data[0].id;
        document.getElementById('user-info').innerText = data.data[0].display_name;
    }

    async function sendTwitchMessage() {
        const msg = document.getElementById('buffer-box').value.trim();
        if (!msg) return;

        const targetName = targetChannelInput.value.trim();
        let targetId = myUserId;

        if (targetName) {
            const resp = await fetch(`https://api.twitch.tv/helix/users?login=${targetName}`, {
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': clientId }
            });
            const d = await resp.json();
            if (d.data && d.data[0]) targetId = d.data[0].id;
            else return addLog("送信先が見つかりません", true);
        }

        const response = await fetch('https://api.twitch.tv/helix/chat/messages', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': clientId, 'Content-Type': 'application/json' },
            body: JSON.stringify({ broadcaster_id: targetId, sender_id: myUserId, message: msg })
        });

        if (response.ok) {
            addLog(`送信成功: ${msg}`);
            document.getElementById('buffer-box').value = "";
        } else {
            const e = await response.json();
            addLog(`エラー: ${e.message}`, true);
        }
    }

    function getHashParams() {
        const hash = window.location.hash.substring(1);
        const params = {};
        hash.split('&').forEach(hk => { const temp = hk.split('='); params[temp[0]] = temp[1]; });
        return params;
    }

    function addLog(text, isError = false) {
        const li = document.createElement('li');
        li.innerText = `${new Date().toLocaleTimeString()} - ${text}`;
        if (isError) li.style.color = '#e0245e';
        document.getElementById('log-list').prepend(li);
    }
</script>
</body>
</html>
